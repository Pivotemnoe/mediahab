services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: media_hub
      POSTGRES_USER: media_hub
      POSTGRES_PASSWORD: media_hub
    ports:
      - "55434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_hub -d media_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mediahub
      MINIO_ROOT_PASSWORD: mediahub-password
    ports:
      - "9100:9000"
      - "9101:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env.example
    ports:
      - "8100:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env.example
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    working_dir: /app/services/worker
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8100/api/v1
    ports:
      - "3100:3000"
    depends_on:
      - api
